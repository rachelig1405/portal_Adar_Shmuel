<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פורטל עובדים</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    direction: rtl;
  }

  .container {
    max-width: 520px;
    margin: 40px auto;
    padding: 20px;
  }

 .logo {
  text-align: center;
  margin-bottom: 10px;
}

.logo img {
  max-width: 260px;
  width: 70%;
  height: auto;
}
  .subtitle {
    text-align: center;
    font-size: 18px;
    color: #555;
    margin-bottom: 30px;
  }

  .button {
    display: block;
    text-decoration: none;
    background: #d71ee7;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    padding: 22px;
    margin-bottom: 18px;
    border-radius: 16px;
    box-shadow: 0 5px 12px rgba(0,0,0,0.18);
  }

  .button:hover {
    background: #145ec0;
  }

  .green { background: #1f9d55; }
  .green:hover { background: #15733e; }

  .orange { background: #f59e0b; }
  .orange:hover { background: #c77700; }

  .red { background: #2b97df; }
  .red:hover { background: #991b1b; }

   .blue { background: #2b97df; }
  .blue:hover { background: #991b1b; }
  .gray { background: #475569; }
  .gray:hover { background: #334155; }
</style>
  <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1565c0">

<link rel="apple-touch-icon" href="icon-192.png">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>


<body>

<div class="container">

  <div class="logo">
  <img src="לוגו.png" alt="לוגו">
</div>
  <div class="subtitle">פורטל פעולות לעובדים</div>

  <a class="button green" href="https://forms.fillout.com/t/1WiJrcLz3rus" target="_blank">
    ➕ הוסף לקוח חדש
  </a>

  <a class="button" href="https://forms.fillout.com/t/92aHFzTN1rus" target="_blank">
    📦 קליטת הזמנה חדשה
  </a>

  <a class="button orange" href="https://forms.fillout.com/t/hswLpsmiqhus" target="_blank">
    🟢 תחילת ליקוט
  </a>

  <a class="button red" href="https://forms.fillout.com/t/k7tFiaTWRRus" target="_blank">
    ✅ סיום ליקוט
  </a>
   <a class="button blue" href="https://forms.fillout.com/t/rhTJRqNZmzus" target="_blank">
    ✅ בדיקת הזמנה
  </a>

  <a class="button gray" href="https://forms.fillout.com/t/kfxxbAQuzMus" target="_blank">
    העמסת הזמנה
  </a>
</div>
  <script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./service-worker.js')
      .then(function () {
        console.log('Service Worker registered');
      })
      .catch(function (err) {
        console.log('Service Worker registration failed', err);
      });
  });
}
</script>
</body>
</html>
